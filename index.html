<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Fantasy Map</title>

<style>
body {
  margin: 0;
  padding: 0;
  background-color: #1c1c1c;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: visible;
}

.map-wrapper {
  position: relative;
  width: 80vw;
  overflow: visible;
}

.map-clip {
  position: relative;
  overflow: hidden;
  width: 100%;
}

.map {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.4s ease, transform-origin 0.4s ease;
  will-change: transform;
}

.overlay {
  position: absolute;
  inset: 0;
  z-index: 1000;
  overflow: visible;
}

.hotspot {
  position: absolute;
  width: 20px;
  height: 20px;
  z-index: 1001;
  transform: none;
}

.hotspot a {
  display: block;
  width: 100%;
  height: 100%;
  background: transparent;
  text-decoration: none;
}

/* POPUP SETTINGS */
.popup {
  position: absolute;
  bottom: 100%;
  left: 100%;
  transform-origin: bottom left;

  --pop-x: 12px;
  --pop-y: -8px;

  /* Bigger appearance */
  --pop-scale-hidden: 0.9;
  --pop-scale-hover: 1.05;

  transform:
    scale(var(--pop-scale-hidden))
    translate(var(--pop-x), var(--pop-y));

  opacity: 0;
  pointer-events: none;
  transition: transform 0.25s ease, opacity 0.25s ease;
  z-index: 999999;
}

.popup img {
  width: 300px;  /* increased from 160px */
  height: auto;
  display: block;
  border-radius: 8px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.7);
}

.hotspot:hover .popup {
  opacity: 1;
  transform:
    scale(var(--pop-scale-hover))
    translate(var(--pop-x), var(--pop-y));
}

.popup-top-left {
  bottom: auto;
  top: 100%;
  left: 100%;
  transform-origin: top left;
}
</style>
</head>

<body>

<div class="map-wrapper">

<div class="map-clip">
  <img src="norn1.png" alt="Fantasy Map" class="map" id="map-image" />
</div>

<div class="overlay">

<!-- Hotspot 1 -->
<div class="hotspot" style="top: 10%; left: 41.5%; --pop-x: 12px; --pop-y: 1118px;"
     data-origin-x="41.5%" data-origin-y="10%">
  <a href="#region1"></a>
  <div class="popup popup-top-left">
    <img src="city 1.png" alt="City 1">
  </div>
</div>

<!-- Hotspot 2 (filename fixed) -->
<div class="hotspot" style="top: 47%; left: 55.75%;"
     data-origin-x="55.75%" data-origin-y="47%">
  <a href="#region2"></a>
  <div class="popup">
    <img src="city 2.png" alt="City 2">
  </div>
</div>

<!-- Add remaining hotspots exactly as before -->
<!-- (You can keep all your others unchanged) -->

</div>
</div>

<script>
const map = document.getElementById("map-image");
const hotspots = document.querySelectorAll(".hotspot");

hotspots.forEach(hotspot => {
  hotspot.addEventListener("mouseenter", () => {
    const x = hotspot.getAttribute("data-origin-x");
    const y = hotspot.getAttribute("data-origin-y");
    map.style.transformOrigin = `${x} ${y}`;
    map.style.transform = "scale(1.1)";
  });

  hotspot.addEventListener("mouseleave", () => {
    map.style.transform = "scale(1)";
  });
});
</script>

</body>
</html>

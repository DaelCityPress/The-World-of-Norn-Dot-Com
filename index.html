<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fantasy Map</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1c1c1c;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: visible;
    }

    /* OUTER WRAPPER: NOT clipped so popups can escape */
    .map-wrapper {
      position: relative;
      width: 80vw;
      overflow: visible;
    }

    /* CLIP BOX: ONLY clips the zoomed map image */
    .map-clip {
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    .map {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.4s ease, transform-origin 0.4s ease;
      will-change: transform;
    }

    /* OVERLAY: hotspots + popups live here (not clipped) */
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 1000;
      overflow: visible;
    }

    .hotspot {
      position: absolute;
      width: 20px;
      height: 20px;
      z-index: 1001;

      /* IMPORTANT: no translate() — keeps your original coordinates */
      transform: none;
    }

    .hotspot a {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
      border: 1px solid transparent;
      text-decoration: none;
    }

    /* Uncomment this temporarily if you want to SEE hotspots for debugging */
    /*
    .hotspot a {
      border: 1px solid rgba(0, 255, 255, 0.5);
      background: rgba(0, 255, 255, 0.15);
    }
    */

    /* POPUP — per-hotspot positioning via CSS variables */
    .popup {
      position: absolute;
      bottom: 100%;
      left: 100%;
      transform-origin: bottom left;

      /* defaults (override per hotspot via style="--pop-x: ...; --pop-y: ...") */
      --pop-x: 12px;
      --pop-y: -8px;
      --pop-scale-hidden: 0.68; /* hidden state size */
      --pop-scale-hover: 0.8;   /* hover size (~20% smaller than original) */

      transform:
        scale(var(--pop-scale-hidden))
        translate(var(--pop-x), var(--pop-y));

      opacity: 0;
      pointer-events: none;
      transition: transform 0.22s ease, opacity 0.22s ease;
      z-index: 999999;
    }

    .popup img {
      width: 160px;
      height: auto;
      display: block;
      border-radius: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .hotspot:hover .popup {
      opacity: 1;
      transform:
        scale(var(--pop-scale-hover))
        translate(var(--pop-x), var(--pop-y));
    }
	
		/* City 1: anchor popup by TOP-LEFT corner instead of bottom-left */
	.popup-top-left {
	  bottom: auto;
	  top: 100%;
	  left: 100%;
	  transform-origin: top left;
	}
  </style>
</head>

  <script>
    const map = document.getElementById("map-image");
    const hotspots = document.querySelectorAll(".hotspot");

    hotspots.forEach(hotspot => {
      hotspot.addEventListener("mouseenter", () => {
        const x = hotspot.getAttribute("data-origin-x");
        const y = hotspot.getAttribute("data-origin-y");
        map.style.transformOrigin = `${x} ${y}`;
        map.style.transform = "scale(1.1)";
      });

      hotspot.addEventListener("mouseleave", () => {
        map.style.transform = "scale(1)";
      });
    });
  </script>
